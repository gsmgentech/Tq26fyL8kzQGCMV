<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>reCAPTCHA with Images Example</title>
  <!-- Include the Google reCAPTCHA API -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <h2>reCAPTCHA v2 - Image Challenge</h2>

  <form id="myForm">
    <!-- Input field for user -->
    <input type="text" id="username" placeholder="Your name" required><br><br>

    <!-- Google reCAPTCHA widget (Image-based challenge will be shown here) -->
    <div class="g-recaptcha" data-sitekey="6LeN4AwrAAAAAMxfYRWcFadKT1DGWzHaEmsF2fn0"></div>

    <br>
    <button type="submit">Submit</button>
  </form>

  <p id="result"></p>

  <script>
    document.getElementById("myForm").addEventListener("submit", function (e) {
      e.preventDefault();

      // Get the reCAPTCHA response
      const response = grecaptcha.getResponse();

      if (!response) {
        document.getElementById("result").textContent = "Please complete the CAPTCHA.";
        return;
      }

      // Simulate form submission after reCAPTCHA is successfully completed
      document.getElementById("result").textContent = "CAPTCHA completed successfully!";
    });
  </script>
</body>
</html>
