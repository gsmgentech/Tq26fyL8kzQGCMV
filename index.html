<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>reCAPTCHA Example</title>
  <!-- Load the reCAPTCHA script -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <h2>reCAPTCHA Example (Frontend Only)</h2>
  
  <form id="myForm">
    <!-- User input -->
    <input type="text" id="username" placeholder="Your name" required><br><br>

    <!-- Google reCAPTCHA -->
    <div class="g-recaptcha" data-sitekey="6LeN4AwrAAAAAMxfYRWcFadKT1DGWzHaEmsF2fn0"></div>
    
    <br>
    <button type="submit">Submit</button>
  </form>

  <p id="result"></p>

  <script>
    document.getElementById("myForm").addEventListener("submit", function (e) {
      e.preventDefault();

      // Get the reCAPTCHA response
      const response = grecaptcha.getResponse();

      // If there's no response (user hasn't clicked checkbox)
      if (!response) {
        document.getElementById("result").textContent = "Please complete the CAPTCHA.";
        return;
      }

      // Show success message if CAPTCHA is completed
      document.getElementById("result").textContent = "CAPTCHA completed successfully!";
    });
  </script>
</body>
</html>
